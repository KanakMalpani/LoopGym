name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    if: ${{ secrets.PYPI_API_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install hatchling build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

  publish-skipped:
    runs-on: ubuntu-latest
    if: ${{ secrets.PYPI_API_TOKEN == '' }}
    steps:
      - name: Missing PYPI_API_TOKEN
        run: |
          echo "::warning::Add PYPI_API_TOKEN to repository secrets, then re-run this workflow or create a new release."
          echo "See PUBLISHING.md in this repository."
          exit 1
